<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Erinnerung</title>

  <!-- =========================================================
       Hochwertige, zeitlose Web-Schriften (Serif für den
       Begrüßungstext, Sans für den Rest). Systemfont-Fallbacks
       sorgen dafür, dass die Seite auch ohne Netz funktioniert.
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =========================================================
       1. Design-Tokens (CSS-Variablen)
       ========================================================= */
    :root {
      /* Farbpalette */
      --color-white:  #FAFAF8;   /* Grundhintergrund             */
      --color-beige:  #F2ECE4;   /* Warmes Beige                 */
      --color-mint:   #DCEFE8;   /* Helles Mint                  */
      --color-text:   #2D2D2D;   /* Dunkles Grau für Text        */

      /* Typografie */
      --font-serif: 'Cormorant Garamond', 'Times New Roman', serif;
      --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Sanfte, ruhige Timing-Funktion (Apple-ähnliches Easing) */
      --ease-soft: cubic-bezier(0.22, 0.61, 0.36, 1);

      /* Abstände */
      --space-page: clamp(1.5rem, 5vw, 4rem);

      /* Höhe der Musik-Leiste (für den Sicherheitsabstand der Galerie) */
      --audio-bar-space: calc(72px + env(safe-area-inset-bottom, 0px));
    }

    /* =========================================================
       2. Reset & Grundlagen
       ========================================================= */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text);
      /* Sehr ruhiger, leicht verlaufender Hintergrund aus der Palette */
      background:
        radial-gradient(circle at 20% 20%, var(--color-mint) 0%, transparent 55%),
        radial-gradient(circle at 80% 80%, var(--color-beige) 0%, transparent 55%),
        var(--color-white);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Reduzierte Bewegung respektieren (Barrierefreiheit) */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }

    /* =========================================================
       3. Intro-Bereich (Begrüßung + Play-Button)
       ========================================================= */
    .intro {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-page);
      z-index: 10;
      /* Blende den gesamten Intro-Block beim Start weich aus */
      transition: opacity 1.6s var(--ease-soft),
                  visibility 1.6s var(--ease-soft);
    }

    /* Zustand: Intro wird ausgeblendet, nachdem die Musik startet */
    .intro.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Der große, elegante Begrüßungstext */
    .intro__text {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(1.9rem, 5.5vw, 3.6rem);
      line-height: 1.35;
      letter-spacing: 0.01em;
      max-width: 20ch;

      /* Start unsichtbar – Fade-In per JS/Animation */
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 2.2s var(--ease-soft) 0.6s forwards;
    }

    .intro__text span {
      display: block;
    }

    /* Zweite Zeile leicht gedämpft für ruhige Hierarchie */
    .intro__text .line-2 {
      color: #6b6b6b;
      margin-top: 0.35em;
    }

    /* -------- Play-Button -------- */
    .play-button {
      /* Erscheint erst ~1s nach dem Text */
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 1.4s var(--ease-soft) 2.6s forwards;

      margin-top: clamp(2.5rem, 6vh, 4rem);
      width: 88px;
      height: 88px;
      border: none;
      border-radius: 50%;
      cursor: pointer;

      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(45, 45, 45, 0.12),
                  0 2px 8px rgba(45, 45, 45, 0.06);

      display: flex;
      align-items: center;
      justify-content: center;

      transition: transform 0.5s var(--ease-soft),
                  box-shadow 0.5s var(--ease-soft),
                  background 0.5s var(--ease-soft);
    }

    /* Dezenter Hover-Effekt: leichte Vergrößerung */
    .play-button:hover,
    .play-button:focus-visible {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 18px 55px rgba(45, 45, 45, 0.16),
                  0 3px 10px rgba(45, 45, 45, 0.08);
      outline: none;
    }

    .play-button:active {
      transform: scale(0.98);
    }

    /* Play-Dreieck (rein per CSS, kein Icon-Framework) */
    .play-button__icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 13px 0 13px 22px;
      border-color: transparent transparent transparent var(--color-text);
      margin-left: 5px; /* optische Zentrierung des Dreiecks */
    }

    /* Sanft pulsierender Ring um den Button für ein lebendiges Detail */
    .play-button::before {
      content: '';
      position: absolute;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 1px solid rgba(45, 45, 45, 0.15);
      animation: pulseRing 3.4s var(--ease-soft) infinite;
    }

    /* =========================================================
       4. Galerie
       ========================================================= */
    .gallery-wrap {
      /* Anfangs verborgen; wird nach dem Klick eingeblendet */
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.4s var(--ease-soft),
                  visibility 1.4s var(--ease-soft);
      /* Zusätzlicher Platz unten, damit die Musik-Leiste nie die
         letzten Fotos überdeckt (inkl. iPhone-Sicherheitsbereich). */
      padding: clamp(4rem, 12vh, 9rem) var(--space-page)
               calc(clamp(4rem, 12vh, 9rem) + var(--audio-bar-space));
      min-height: 100vh;
    }

    .gallery-wrap.is-visible {
      opacity: 1;
      visibility: visible;
    }

    /* Ruhiger Satz oben über der Galerie
       (gleiche Schriftart/Stil wie zuvor der Schlusssatz) */
    .gallery__intro {
      text-align: center;
      font-family: var(--font-serif);
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.1rem, 2.6vw, 1.6rem);
      color: #6b6b6b;
      margin-bottom: clamp(2.5rem, 6vh, 4.5rem);

      opacity: 0;
      transform: translateY(10px);
      transition: opacity 1.4s var(--ease-soft),
                  transform 1.4s var(--ease-soft);
    }
    .gallery__intro.reveal {
      opacity: 1;
      transform: translateY(0);
    }

    /* Masonry-ähnliches Layout via CSS-Columns.
       Auf großen Screens 3 Spalten, auf Tablets 2, auf Handy 1. */
    .gallery {
      max-width: 1100px;
      margin: 0 auto;
      column-count: 3;
      column-gap: clamp(0.9rem, 2vw, 1.6rem);
    }

    @media (max-width: 820px) {
      .gallery { column-count: 2; }
    }
    @media (max-width: 520px) {
      .gallery { column-count: 1; }
    }

    /* Einzelne Bildkacheln */
    .gallery__item {
      break-inside: avoid;           /* verhindert Umbruch innerhalb einer Kachel */
      margin-bottom: clamp(0.9rem, 2vw, 1.6rem);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(45, 45, 45, 0.08);
      cursor: zoom-in;               /* signalisiert: antippen zum Vergrößern */

      /* Startzustand für die gestaffelte Reveal-Animation */
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 1.2s var(--ease-soft),
                  transform 1.2s var(--ease-soft);
    }

    .gallery__item.reveal {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery__item img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
      transition: transform 0.7s var(--ease-soft);
    }

    /* Dezente Vergrößerung beim Hover (nur auf Geräten mit echtem Zeiger) */
    @media (hover: hover) {
      .gallery__item:hover img {
        transform: scale(1.04);
      }
    }

    /* =========================================================
       4b. Dezente Musik-Leiste (Titel/Interpret + Pause/Play)
       ========================================================= */
    .audio-bar {
      position: fixed;
      right: clamp(1.2rem, 3vw, 2.2rem);
      bottom: calc(clamp(1.2rem, 3vw, 2.2rem) + env(safe-area-inset-bottom, 0px));
      z-index: 20;

      display: flex;
      align-items: center;
      gap: clamp(0.6rem, 1.6vw, 1rem);

      /* Leichtes Glas-Panel, damit Titel auch über Fotos gut lesbar ist */
      padding: 0.4rem 0.5rem 0.4rem 1rem;
      border-radius: 999px;
      background: rgba(250, 250, 248, 0.72);
      backdrop-filter: blur(12px) saturate(1.1);
      -webkit-backdrop-filter: blur(12px) saturate(1.1);
      box-shadow: 0 10px 34px rgba(45, 45, 45, 0.16),
                  0 2px 8px rgba(45, 45, 45, 0.06);
      max-width: calc(100vw - 2 * clamp(1.2rem, 3vw, 2.2rem));

      /* Anfangs verborgen; erscheint mit der Galerie */
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: opacity 1s var(--ease-soft),
                  visibility 1s var(--ease-soft),
                  transform 1s var(--ease-soft);
    }

    .audio-bar.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* Titel & Interpret – zurückhaltend, rechtsbündig links vom Button */
    .audio-bar__meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      line-height: 1.25;
      min-width: 0;                  /* erlaubt Ellipsis im Flex-Kind */
    }

    .audio-bar__title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .audio-bar__artist {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: clamp(0.72rem, 1.7vw, 0.85rem);
      letter-spacing: 0.03em;
      color: #7a7a7a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .audio-toggle {
      flex: 0 0 auto;
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      cursor: pointer;

      /* Gleicher, leichter Glas-Look wie der Play-Button */
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 6px 20px rgba(45, 45, 45, 0.14),
                  0 2px 6px rgba(45, 45, 45, 0.06);

      display: flex;
      align-items: center;
      justify-content: center;

      transition: transform 0.45s var(--ease-soft),
                  background 0.45s var(--ease-soft),
                  box-shadow 0.45s var(--ease-soft);
    }

    .audio-toggle:hover,
    .audio-toggle:focus-visible {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 1);
      outline: none;
    }
    .audio-toggle:active {
      transform: scale(0.96);
    }

    /* Pause-Symbol: zwei schmale Balken */
    .audio-toggle__pause {
      width: 16px;
      height: 18px;
      border-left: 5px solid var(--color-text);
      border-right: 5px solid var(--color-text);
      box-sizing: border-box;
    }

    /* Play-Symbol: kleines Dreieck (wie der Haupt-Button) */
    .audio-toggle__play {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 9px 0 9px 15px;
      border-color: transparent transparent transparent var(--color-text);
      margin-left: 4px; /* optische Zentrierung */
      display: none;    /* Standard: Musik läuft -> Pause-Symbol sichtbar */
    }

    /* Zustand "pausiert": Play-Symbol zeigen, Pause-Symbol ausblenden */
    .audio-toggle.is-paused .audio-toggle__pause { display: none; }
    .audio-toggle.is-paused .audio-toggle__play  { display: block; }

    /* Auf sehr schmalen Handys darf der Titel den halben Screen nutzen */
    @media (max-width: 520px) {
      .audio-bar__title  { max-width: 46vw; }
      .audio-bar__artist { max-width: 46vw; }
    }

    /* =========================================================
       4c. Lightbox / Vollbild-Ansicht der Fotos
       ========================================================= */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 40;

      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(0.8rem, 3vw, 2rem);
      padding-top: calc(clamp(0.8rem, 3vw, 2rem) + env(safe-area-inset-top, 0px));
      padding-bottom: calc(clamp(0.8rem, 3vw, 2rem) + env(safe-area-inset-bottom, 0px));

      background: rgba(28, 28, 28, 0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s var(--ease-soft),
                  visibility 0.4s var(--ease-soft);
      cursor: zoom-out;
    }

    .lightbox.is-open {
      opacity: 1;
      visibility: visible;
    }

    .lightbox__img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);

      transform: scale(0.96);
      transition: transform 0.4s var(--ease-soft);
    }

    .lightbox.is-open .lightbox__img {
      transform: scale(1);
    }

    /* Schließen-Button oben rechts */
    .lightbox__close {
      position: absolute;
      top: calc(clamp(0.6rem, 2vw, 1.2rem) + env(safe-area-inset-top, 0px));
      right: clamp(0.6rem, 2vw, 1.2rem);

      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      cursor: pointer;

      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 1.6rem;
      line-height: 1;

      display: flex;
      align-items: center;
      justify-content: center;

      transition: background 0.3s var(--ease-soft),
                  transform 0.3s var(--ease-soft);
    }

    .lightbox__close:hover,
    .lightbox__close:focus-visible {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.08);
      outline: none;
    }

    /* Verhindert Scrollen im Hintergrund, während die Lightbox offen ist */
    body.lightbox-open {
      overflow: hidden;
    }

    /* =========================================================
       5. Keyframe-Animationen
       ========================================================= */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseRing {
      0%   { transform: scale(1);    opacity: 0.9; }
      70%  { transform: scale(1.35); opacity: 0;   }
      100% { transform: scale(1.35); opacity: 0;   }
    }
  </style>
</head>

<body>
  <!-- =========================================================
       Intro: ruhiger Bildschirm mit Begrüßungstext + Play-Button
       ========================================================= -->
  <section class="intro" id="intro">
    <p class="intro__text">
      <span class="line-1">Manche Erinnerungen verblassen.</span>
      <span class="line-2">Diese darf gerne weiterklingen.</span>
    </p>

    <!-- Play-Button (rein per CSS gestaltet) -->
    <button class="play-button" id="playButton" aria-label="Erinnerung abspielen">
      <span class="play-button__icon" aria-hidden="true"></span>
    </button>
  </section>

  <!-- =========================================================
       Galerie: erscheint nach dem Klick auf Play
       ========================================================= -->
  <main class="gallery-wrap" id="galleryWrap">
    <!-- Ruhiger Satz oben -->
    <p class="gallery__intro" id="galleryIntro">
      Danke, dass du einen Moment bleibst.
    </p>

    <!-- Wird automatisch aus dem assets-Ordner befüllt (siehe JavaScript) -->
    <div class="gallery" id="gallery"></div>
  </main>

  <!-- Audio-Element ohne sichtbare Steuerung (kein visibler Player) -->
  <audio id="audio" src="assets/song.mp3" preload="auto"></audio>

  <!-- Dezente Musik-Leiste: Titel/Interpret + Umschalter
       (erscheint gemeinsam mit der Galerie) -->
  <div class="audio-bar" id="audioBar">
    <div class="audio-bar__meta">
      <span class="audio-bar__title">With You (feat. Kina Grannis)</span>
      <span class="audio-bar__artist">I Fight Dragons</span>
    </div>

    <button class="audio-toggle" id="audioToggle" aria-label="Musik pausieren">
      <span class="audio-toggle__pause" aria-hidden="true"></span>
      <span class="audio-toggle__play" aria-hidden="true"></span>
    </button>
  </div>

  <!-- =========================================================
       Lightbox: Vollbild-Ansicht eines angetippten Fotos
       ========================================================= -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Foto in Vollbild">
    <button class="lightbox__close" id="lightboxClose" aria-label="Schließen">&times;</button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="" />
  </div>

  <script>
    /* =========================================================
       JavaScript: steuert Ablauf, Musikstart und Reveal-Animationen
       ========================================================= */
    (function () {
      'use strict';

      // Relevante Elemente einmalig referenzieren
      const intro        = document.getElementById('intro');
      const playButton   = document.getElementById('playButton');
      const audio        = document.getElementById('audio');
      const galleryWrap  = document.getElementById('galleryWrap');
      const galleryIntro = document.getElementById('galleryIntro');
      const gallery      = document.getElementById('gallery');
      const audioBar     = document.getElementById('audioBar');
      const audioToggle  = document.getElementById('audioToggle');
      const lightbox     = document.getElementById('lightbox');
      const lightboxImg  = document.getElementById('lightboxImg');
      const lightboxClose= document.getElementById('lightboxClose');

      let started = false; // verhindert Mehrfach-Auslösung

      /* ---------------------------------------------------------
         Konfiguration
         ---------------------------------------------------------
         Ein statischer Server (z. B. GitHub Pages) liefert im Browser
         keine Ordner-Auflistung. Damit die Namen der Fotos egal sind,
         fragen wir stattdessen die öffentliche GitHub-API, welche
         Dateien im Ordner "assets" liegen, und zeigen alle Bilder an –
         unabhängig vom Dateinamen. Läuft die Seite lokal oder nicht auf
         GitHub Pages, greift automatisch ein Fallback (photo1, photo2 …).
      --------------------------------------------------------- */
      const ASSETS_DIR   = 'assets';                           // Bilder-Ordner
      const IMAGE_REGEX  = /\.(jpe?g|png|webp|gif|avif)$/i;    // erlaubte Bild-Endungen
      const STAGGER_MS   = 500;                                // Versatz zwischen Bildern
      const MAX_FALLBACK = 60;                                 // Obergrenze im Fallback

      /* Optional: Falls die automatische Erkennung von Nutzer/Repo
         einmal nicht klappt, hier fest eintragen, z. B.:
         const REPO_OVERRIDE = { owner: 'deinname', repo: 'erinnerung' };
      */
      const REPO_OVERRIDE = null;

      /**
       * Ermittelt aus der aktuellen Adresse Nutzer und Repository,
       * wenn die Seite auf GitHub Pages läuft (…github.io).
       * Gibt { owner, repo } zurück oder null.
       */
      function detectRepo() {
        if (REPO_OVERRIDE) return REPO_OVERRIDE;

        const host = window.location.hostname; // z. B. "name.github.io"
        if (!host.endsWith('github.io')) return null;

        const owner = host.split('.')[0];
        // Erster Pfad-Abschnitt = Projekt-Repo; sonst User-Seiten-Repo
        const seg = window.location.pathname.split('/').filter(Boolean);
        const repo = seg.length ? seg[0] : (owner + '.github.io');
        return { owner: owner, repo: repo };
      }

      /**
       * Holt über die GitHub-API die Liste aller Bilddateien im
       * assets-Ordner. Gibt ein Array von URLs zurück (leer bei Fehler).
       */
      async function fetchImageListFromGitHub() {
        const info = detectRepo();
        if (!info) return [];

        const api = 'https://api.github.com/repos/' + info.owner +
                    '/' + info.repo + '/contents/' + ASSETS_DIR;
        try {
          const res = await fetch(api);
          if (!res.ok) return [];
          const data = await res.json();
          if (!Array.isArray(data)) return [];

          return data
            .filter(function (f) {
              return f.type === 'file' && IMAGE_REGEX.test(f.name);
            })
            // Natürliche, stabile Sortierung nach Dateiname
            .sort(function (a, b) {
              return a.name.localeCompare(b.name, undefined, { numeric: true });
            })
            .map(function (f) {
              // Gleiche Herkunft nutzen; Sonderzeichen im Namen kodieren
              return ASSETS_DIR + '/' + encodeURIComponent(f.name);
            });
        } catch (e) {
          return []; // Netzwerkfehler/Ratelimit -> Fallback greift
        }
      }

      /**
       * Fallback ohne GitHub-API: sucht der Reihe nach photo1, photo2 …
       * (nützlich beim lokalen Testen). Gibt gefundene URLs zurück.
       */
      function tryLoad(url) {
        return new Promise(function (resolve) {
          const img = new Image();
          img.onload  = function () { resolve(url); };
          img.onerror = function () { resolve(null); };
          img.src = url;
        });
      }

      async function fetchImageListFallback() {
        const exts = ['jpg', 'jpeg', 'png', 'webp'];
        const urls = [];
        for (let i = 1; i <= MAX_FALLBACK; i++) {
          let found = null;
          for (const ext of exts) {
            found = await tryLoad(ASSETS_DIR + '/photo' + i + '.' + ext);
            if (found) break;
          }
          if (!found) break;
          urls.push(found);
        }
        return urls;
      }

      /**
       * Fügt ein Bild elegant in die Galerie ein und blendet es
       * mit sanftem, gestaffeltem Versatz ein.
       */
      function appendImage(url, position) {
        const figure = document.createElement('figure');
        figure.className = 'gallery__item';

        const img = document.createElement('img');
        img.src = url;
        img.alt = 'Erinnerung ' + position;
        img.loading = 'lazy';

        // Antippen / Klick öffnet das Foto in Vollbild
        figure.addEventListener('click', function () {
          openLightbox(url, img.alt);
        });

        figure.appendChild(img);
        gallery.appendChild(figure);

        window.setTimeout(function () {
          figure.classList.add('reveal');
        }, 200 + position * STAGGER_MS);
      }

      /**
       * Lädt die Bildliste (erst GitHub-API, sonst Fallback) und
       * zeigt alle gefundenen Bilder nacheinander an.
       */
      async function loadGallery() {
        // Satz oben zuerst einblenden
        window.setTimeout(function () {
          galleryIntro.classList.add('reveal');
        }, 300);

        let urls = await fetchImageListFromGitHub();
        if (urls.length === 0) {
          urls = await fetchImageListFallback();
        }

        urls.forEach(function (url, index) {
          appendImage(url, index + 1);
        });
      }

      /* ---------------------------------------------------------
         Lightbox: Foto in Vollbild öffnen / schließen
         --------------------------------------------------------- */
      function openLightbox(url, alt) {
        lightboxImg.src = url;
        lightboxImg.alt = alt || '';
        lightbox.classList.add('is-open');
        document.body.classList.add('lightbox-open');
        // Fokus auf den Schließen-Button für Tastatur/Barrierefreiheit
        lightboxClose.focus();
      }

      function closeLightbox() {
        lightbox.classList.remove('is-open');
        document.body.classList.remove('lightbox-open');
        // Quelle nach dem Ausblenden leeren (spart Speicher)
        window.setTimeout(function () {
          if (!lightbox.classList.contains('is-open')) {
            lightboxImg.src = '';
          }
        }, 400);
      }

      // Klick auf den Hintergrund oder das Bild schließt die Lightbox
      lightbox.addEventListener('click', closeLightbox);
      lightboxClose.addEventListener('click', function (e) {
        e.stopPropagation();
        closeLightbox();
      });
      // Klick auf das Bild selbst soll ebenfalls schließen (zoom-out)
      lightboxImg.addEventListener('click', function (e) {
        e.stopPropagation();
        closeLightbox();
      });
      // Escape-Taste schließt die Lightbox
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && lightbox.classList.contains('is-open')) {
          closeLightbox();
        }
      });

      /**
       * Startet die Erinnerung: Musik abspielen, Intro ausblenden,
       * Galerie einblenden.
       */
      function startExperience() {
        if (started) return;
        started = true;

        // Musik starten (durch Nutzerklick erlaubt)
        audio.play().catch(function () {
          /* Falls die Datei fehlt oder blockiert wird,
             läuft die visuelle Erfahrung dennoch weiter. */
        });

        // Intro sanft ausblenden
        intro.classList.add('is-hidden');

        // Galerie nach dem Ausblenden des Intros zeigen
        window.setTimeout(function () {
          galleryWrap.classList.add('is-visible');
          audioBar.classList.add('is-visible'); // Musik-Leiste einblenden
          loadGallery();

          // Sanft zur Galerie scrollen
          galleryWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 1200);
      }

      /**
       * Schaltet die Musik zwischen Abspielen und Pause um und
       * aktualisiert Symbol sowie Beschriftung des Buttons.
       */
      function toggleAudio() {
        if (audio.paused) {
          audio.play().catch(function () {});
          audioToggle.classList.remove('is-paused');
          audioToggle.setAttribute('aria-label', 'Musik pausieren');
        } else {
          audio.pause();
          audioToggle.classList.add('is-paused');
          audioToggle.setAttribute('aria-label', 'Musik fortsetzen');
        }
      }

      // Falls die Musik von selbst endet, Button auf "Play" zurücksetzen
      audio.addEventListener('ended', function () {
        audioToggle.classList.add('is-paused');
        audioToggle.setAttribute('aria-label', 'Musik fortsetzen');
      });

      // Klick auf den Play-Button startet alles
      playButton.addEventListener('click', startExperience);

      // Klick auf den Umschalter pausiert / startet die Musik
      audioToggle.addEventListener('click', toggleAudio);
    })();
  </script>
</body>
</html>
